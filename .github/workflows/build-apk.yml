name: Android CI (Auto Build APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Memungkinkan trigger manual dari web GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper if missing
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Gradle wrapper tidak ditemukan, membuat wrapper baru..."
            gradle wrapper --gradle-version 9.3.1
            chmod +x gradlew
          else
            chmod +x gradlew
          fi

      - name: Build Debug APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder-project.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'placeholderKey' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholderKey' }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
